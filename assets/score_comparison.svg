<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" role="img" aria-labelledby="scoreTitle scoreDesc" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif">
  <title id="scoreTitle">Average proxy cost comparison</title>
  <desc id="scoreDesc">Average proxy cost on 17 IBM ICCAD04 benchmarks. Soft-Overlap SA 1.4713; RePlAce 1.4578; SA baseline 2.1251.</desc>

  
  <rect width="1100" height="460" fill="#fbfbfc"></rect>

  
  <text x="56" y="58" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.2">Average proxy cost</text>
  <text x="56" y="82" font-size="14" fill="#475569">17 IBM ICCAD04 benchmarks</text>

  <line x1="56" y1="104" x2="1044" y2="104" stroke="#e5e7eb" stroke-width="1"></line>

  
  <text x="320" y="138" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1.2">PROXY COST</text>

  
  
  

  
  <line x1="320" y1="160" x2="320" y2="380" stroke="#cbd5e1" stroke-width="1"></line>
  <line x1="540" y1="160" x2="540" y2="380" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"></line>
  <line x1="760" y1="160" x2="760" y2="380" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"></line>
  <line x1="980" y1="160" x2="980" y2="380" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2 3"></line>

  
  <line x1="320" y1="380" x2="980" y2="380" stroke="#94a3b8" stroke-width="1"></line>

  
  <text x="320" y="402" font-size="12" fill="#64748b" text-anchor="middle">1.0</text>
  <text x="540" y="402" font-size="12" fill="#64748b" text-anchor="middle">1.5</text>
  <text x="760" y="402" font-size="12" fill="#64748b" text-anchor="middle">2.0</text>
  <text x="980" y="402" font-size="12" fill="#64748b" text-anchor="middle">2.5</text>

  
  

  
  <text x="304" y="194" font-size="14" font-weight="600" fill="#0f172a" text-anchor="end">Soft-Overlap SA</text>
  <text x="304" y="212" font-size="11" fill="#64748b" text-anchor="end">ours</text>
  <rect x="320" y="178" width="207.4" height="36" fill="#2563eb"></rect>
  <text x="537" y="201" font-size="13" font-weight="600" fill="#0f172a">1.4713</text>

  
  <text x="304" y="264" font-size="14" font-weight="500" fill="#0f172a" text-anchor="end">RePlAce</text>
  <text x="304" y="282" font-size="11" fill="#64748b" text-anchor="end">analytical baseline</text>
  <rect x="320" y="248" width="201.4" height="36" fill="#64748b"></rect>
  <text x="531" y="271" font-size="13" font-weight="500" fill="#334155">1.4578</text>

  
  <text x="304" y="334" font-size="14" font-weight="500" fill="#0f172a" text-anchor="end">SA baseline</text>
  <text x="304" y="352" font-size="11" fill="#64748b" text-anchor="end">non-incremental</text>
  <rect x="320" y="318" width="495.04" height="36" fill="#cbd5e1"></rect>
  <text x="825" y="341" font-size="13" font-weight="500" fill="#334155">2.1251</text>

  
  <text x="1044" y="429" font-size="11" fill="#94a3b8" text-anchor="end">Soft-Overlap SA from a local <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#475569">evaluate --all</tspan> run · ~0.9% behind RePlAce, ~31% ahead of SA baseline</text>
</svg>