<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="pipelineTitle pipelineDesc" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif">
  <title id="pipelineTitle">Soft-Overlap SA Macro Placer pipeline</title>
  <desc id="pipelineDesc">Four-stage left-to-right pipeline: starting from the initial placement, repairing overlaps with a soft penalty, refining legal moves with incremental simulated annealing, returning a zero-overlap placement.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"></path>
    </marker>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f1f5f9"></rect>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#e2e8f0" stroke-width="2"></line>
    </pattern>
  </defs>

  
  <rect width="1400" height="560" fill="#fbfbfc"></rect>

  
  <text x="56" y="62" font-size="28" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Soft-Overlap SA Macro Placer</text>
  <text x="56" y="92" font-size="16" font-weight="400" fill="#475569">Minimum-displacement legalization, followed by legal incremental simulated annealing.</text>

  
  <line x1="56" y1="116" x2="1344" y2="116" stroke="#e5e7eb" stroke-width="1"></line>

  
  <text x="56" y="146" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1.5">INPUT</text>
  <text x="396" y="146" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1.5">PHASE 1 — LEGALIZE</text>
  <text x="736" y="146" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1.5">PHASE 2 — REFINE</text>
  <text x="1076" y="146" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1.5">OUTPUT</text>

  
  <g>
    <rect x="56" y="160" width="300" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"></rect>
    <text x="80" y="194" font-size="18" font-weight="600" fill="#0f172a">Initial placement</text>
    <text x="80" y="216" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#2563eb">initial.plc</text>

    
    <rect x="80" y="234" width="252" height="148" rx="4" fill="url(#stripes)" stroke="#cbd5e1" stroke-width="1"></rect>
    
    <rect x="96" y="250" width="64" height="44" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="172" y="262" width="58" height="52" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="244" y="252" width="72" height="38" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="100" y="312" width="80" height="58" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    
    <rect x="200" y="330" width="76" height="44" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="248" y="312" width="68" height="48" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    
    <rect x="248" y="330" width="28" height="30" fill="#fb923c" fill-opacity="0.55" stroke="#ea580c" stroke-width="1"></rect>
    <text x="296" y="320" font-size="10" font-weight="600" fill="#ea580c" text-anchor="end">
      <tspan x="324" y="402">overlap</tspan>
    </text>
    <line x1="290" y1="396" x2="270" y2="350" stroke="#ea580c" stroke-width="1"></line>

    
    <text x="80" y="424" font-size="13" fill="#334155">Use the supplied analytical</text>
    <text x="80" y="442" font-size="13" fill="#334155">starting point. Preserve the</text>
    <text x="80" y="460" font-size="13" fill="#334155">useful global structure.</text>
  </g>

  
  <line x1="368" y1="315" x2="392" y2="315" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"></line>

  
  <g>
    <rect x="396" y="160" width="300" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"></rect>
    <text x="420" y="194" font-size="18" font-weight="600" fill="#0f172a">Soft-overlap legalization</text>
    <text x="420" y="216" font-size="13" fill="#64748b">Penalty drives overlap to zero</text>

    
    <rect x="420" y="234" width="252" height="100" rx="4" fill="url(#stripes)" stroke="#cbd5e1" stroke-width="1"></rect>
    
    <rect x="436" y="248" width="46" height="34" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="468" y="260" width="44" height="38" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="468" y="260" width="14" height="22" fill="#fb923c" fill-opacity="0.55" stroke="#ea580c" stroke-width="1"></rect>
    <rect x="440" y="294" width="52" height="32" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>

    
    <line x1="510" y1="284" x2="568" y2="284" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 3"></line>
    <text x="539" y="278" font-size="9" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">λ ↑</text>

    
    <rect x="578" y="246" width="38" height="32" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="622" y="246" width="38" height="32" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="578" y="286" width="38" height="36" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="622" y="286" width="38" height="36" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>

    
    <text x="420" y="416" font-size="13" fill="#334155">λ ramps upward across the schedule.</text>
    <text x="420" y="436" font-size="13" fill="#334155">Early moves preserve quality;</text>
    <text x="420" y="454" font-size="13" fill="#334155">late moves force legality.</text>
  </g>

  
  <line x1="708" y1="315" x2="732" y2="315" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"></line>

  
  <g>
    <rect x="736" y="160" width="300" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"></rect>
    <text x="760" y="194" font-size="18" font-weight="600" fill="#0f172a">Hard-reject incremental SA</text>
    <text x="760" y="216" font-size="13" fill="#64748b">Refine only legal placements</text>

    
    <g transform="translate(760,238)">
      
      <rect x="0" y="0" width="252" height="30" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"></rect>
      <text x="14" y="20" font-size="12" font-weight="500" fill="#1e3a8a">1 · sample move</text>
      
      <line x1="126" y1="32" x2="126" y2="40" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"></line>

      
      <rect x="0" y="44" width="252" height="30" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"></rect>
      <text x="14" y="64" font-size="12" font-weight="500" fill="#9a3412">2 · overlap check</text>
      <text x="238" y="64" font-size="10" font-style="italic" fill="#c2410c" text-anchor="end">reject if any</text>
      <line x1="126" y1="76" x2="126" y2="84" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"></line>

      
      <rect x="0" y="88" width="252" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"></rect>
      <text x="14" y="108" font-size="12" font-weight="500" fill="#166534">3 · incremental score</text>
      <line x1="126" y1="120" x2="126" y2="128" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"></line>

      
      <rect x="0" y="132" width="252" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"></rect>
      <text x="14" y="152" font-size="12" font-weight="500" fill="#0f172a">4 · accept / reject</text>

      
      <path d="M 252 147 Q 274 147 274 75 Q 274 15 252 15" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#arr)"></path>
    </g>

    
    <text x="760" y="425" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.8">FAST LOCAL UPDATES</text>
    <text x="760" y="445" font-size="12" fill="#334155">HPWL bbox · density bins · RUDY bins</text>
    <text x="760" y="461" font-size="12" fill="#334155">on touched nets and moved macros only.</text>
  </g>

  
  <line x1="1048" y1="315" x2="1072" y2="315" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"></line>

  
  <g>
    <rect x="1076" y="160" width="268" height="310" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"></rect>
    <text x="1100" y="194" font-size="18" font-weight="600" fill="#0f172a">Final legal placement</text>
    <text x="1100" y="216" font-size="13" fill="#64748b">Returned via standard placer API</text>

    
    <rect x="1100" y="234" width="220" height="148" rx="4" fill="url(#stripes)" stroke="#cbd5e1" stroke-width="1"></rect>
    <rect x="1112" y="246" width="56" height="40" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="1180" y="246" width="48" height="32" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="1240" y="246" width="68" height="46" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="1112" y="298" width="62" height="40" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="1184" y="290" width="56" height="52" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="1252" y="304" width="56" height="38" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>
    <rect x="1112" y="350" width="86" height="22" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
    <rect x="1208" y="350" width="100" height="22" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"></rect>

    
    <g transform="translate(1100,400)">
      <rect x="0" y="0" width="148" height="30" rx="15" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"></rect>
      <circle cx="18" cy="15" r="5" fill="#22c55e"></circle>
      <path d="M15.5 15 L17.5 17 L21 13" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
      <text x="32" y="20" font-size="12" font-weight="600" fill="#065f46">0 hard overlaps</text>
    </g>

  </g>

  
  <line x1="56" y1="498" x2="1344" y2="498" stroke="#e5e7eb" stroke-width="1"></line>
  <text x="56" y="524" font-size="12" font-weight="600" fill="#64748b" letter-spacing="0.5">OFFICIAL SCORE</text>
  <text x="170" y="524" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0f172a">wirelength + 0.5 · density + 0.5 · congestion</text>
  <text x="1344" y="524" font-size="12" fill="#94a3b8" text-anchor="end">Inner-loop estimates guide search; the evaluator is the source of truth.</text>
</svg>